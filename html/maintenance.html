<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт на обслуживании — Turkistan IT Solutions">
    <meta name="robots" content="noindex, nofollow">
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/fav.svg">
    <title>Режим обслуживания | Turkistan IT Solutions</title>
    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/plugins/fontawesome.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="utility-page home-bg">

    <main class="utility-main">
        <div class="container">
            <div class="utility-layout section-inner bg-white">
                <header class="utility-header square-dot border-1 bg-white">
                    <a href="index.html" class="utility-header__logo">
                        <img src="assets/images/logo/logo.png" alt="Turkistan IT Solutions">
                    </a>
                    
                    <span class="square-shape top-left"></span>
                    <span class="square-shape bottom-left"></span>
                    <span class="square-shape top-right"></span>
                    <span class="square-shape bottom-right"></span>
                </header>
                <div class="utility-card">
                    <div class="utility-card__bg" aria-hidden="true">
                        <img src="assets/images/banner/shape/bg-shape.svg" alt="">
                    </div>
                    <div class="utility-card__content">
                    <p class="utility-card__eyebrow">
                        <span class="utility-card__status-dot" aria-hidden="true"></span>
                        Режим обслуживания
                    </p>
                    <h1 class="utility-card__title utility-card__title--large second-font font-semi-bold">
                        Сайт временно<br>недоступен
                    </h1>
                    <p class="utility-card__desc">
                        Мы обновляем сервисы и улучшаем платформу. Совсем скоро всё снова заработает — а пока вы можете связаться с нами напрямую.
                    </p>
                    <div class="utility-card__progress" role="progressbar" aria-label="Обновление в процессе" aria-valuemin="0" aria-valuemax="100">
                        <span class="utility-card__progress-bar"></span>
                    </div>
                    <p class="utility-card__note">Офис и сервисный центр работают в обычном режиме.</p>
                    <div class="utility-card__contacts">
                        <a href="https://wa.me/" class="utility-social-btn" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                        <a href="https://t.me/" class="utility-social-btn" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
                            <i class="fa-brands fa-telegram"></i>
                        </a>
                        <a href="https://instagram.com/" class="utility-social-btn" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                    </div>
                    </div>
                </div>
                <div class="bottom-shape-area square-dot border-1 bg-white">
                    <img src="assets/images/about/shape-02.svg" alt="">
                    <span class="square-shape top-left"></span>
                    <span class="square-shape bottom-left"></span>
                    <span class="square-shape top-right"></span>
                    <span class="square-shape bottom-right"></span>
                </div>
            </div>
        </div>
    </main>

    <footer class="utility-footer">
        <p>© <span id="utility-year"></span> Turkistan IT Solutions</p>
    </footer>

    <script>
        document.getElementById('utility-year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
